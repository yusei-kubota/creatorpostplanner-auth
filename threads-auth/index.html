<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NobiNote Threads Auth</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #f5f5f7;
      color: #111;
    }

    body {
      align-items: center;
      display: flex;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 18px 48px rgb(0 0 0 / 10%);
      max-width: 420px;
      padding: 32px 24px;
      text-align: center;
      width: 100%;
    }

    h1 {
      font-size: 22px;
      line-height: 1.35;
      margin: 0 0 12px;
    }

    p {
      color: #777;
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    a {
      background: #000;
      border-radius: 999px;
      color: #fff;
      display: inline-block;
      font-weight: 700;
      padding: 14px 22px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>NobiNoteへ戻っています</h1>
    <p>画面が切り替わらない場合は、下のボタンを押してください。</p>
    <a id="open-app" href="creatorpostplanner://threads-auth">アプリを開く</a>
  </main>

  <script>
    const appURL = `creatorpostplanner://threads-auth${window.location.search}${window.location.hash}`;
    const openApp = document.getElementById("open-app");
    openApp.href = appURL;
    window.location.replace(appURL);
  </script>
</body>
</html>
